[project]
name = "step3-5-flash"
version = "0.1.0"
description = "NVIDIA Blackwell optimized project for Step 3.5 Flash"
readme = "README.md"
requires-python = ">=3.11,<3.12"
dependencies = [
    "accelerate>=1.13.0",
    "safetensors>=0.7.0",
    "torch>=2.5.0",
    "transformers>=4.45.0",
]

[[tool.uv.index]]
name = "pytorch-cuda"
url = "https://download.pytorch.org/whl/cu124"

[tool.uv]
index-strategy = "unsafe-best-match"

[tool.uv.sources]
torch = [{ index = "pytorch-cuda" }]
