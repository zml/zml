[project]
name = "step3-5"
version = "0.1.0"
description = "ROCm optimized project for MI300X"
readme = "README.md"
requires-python = ">=3.11,<3.12"
dependencies = [
    "accelerate>=1.13.0",
    "safetensors>=0.7.0",
    "torch>=2.5.0",
    "transformers>=4.45.0",
]

[[tool.uv.index]]
name = "pytorch-rocm"
url = "https://download.pytorch.org/whl/rocm6.2"

[tool.uv]
index-strategy = "unsafe-best-match"

[tool.uv.sources]
torch = [{ index = "pytorch-rocm" }]
pytorch-triton-rocm = [{ index = "pytorch-rocm" }]
