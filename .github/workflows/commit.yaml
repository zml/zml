name: commit
on:
  push:
    branches:
    - master
    tags:
    - '*'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'master')}}

jobs:
  test:
    runs-on: ["runs-on","runner=4cpu-linux-x64", "image=ubuntu24-amd64", "run-id=${{ github.run_id }}"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1
          mirror: https://mirror.zml.ai/zig

      - name: Zig Format
        run: zig fmt --check  $(git ls-files --exclude-standard -- '*.zig' | xargs)

      - name: No autofix in Zig code
        run: bash -c "! git grep -l '// autofix' -- '*.zig'"

      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          cache-version: 2
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          external-cache: true
          bazelrc: |
            common --config=debug
            common --verbose_failures
            common --keep_going
            common --test_output=streamed
            common --color=yes
            common --show_timestamps

      - name: Debug - Find bazelisk installation
        run: |
          echo "=== PATH ==="
          echo $PATH
          echo "=== Looking for bazel/bazelisk binaries ==="
          which bazel || echo "bazel not found in PATH"
          which bazelisk || echo "bazelisk not found in PATH"
          echo "=== Searching filesystem for bazel* ==="
          find /usr /opt /home -name "bazel*" 2>/dev/null || true
          find $HOME -name "bazel*" 2>/dev/null || true
          echo "=== Checking common locations ==="
          ls -la /usr/local/bin/bazel* 2>/dev/null || echo "No bazel* in /usr/local/bin/"
          ls -la /usr/bin/bazel* 2>/dev/null || echo "No bazel* in /usr/bin/"
          ls -la ~/.local/bin/bazel* 2>/dev/null || echo "No bazel* in ~/.local/bin/"


      - name: ZML / bazel mod explain
        run: bazelisk mod explain

      - name: ZML / bazel mod graph
        run: bazelisk mod graph

      - name: ZML / bazel query //...
        run: bazelisk query //...

      - name: ZML / bazel build //...
        run: bazelisk build //...

      - name: ZML / bazel test //...
        run: bazelisk test //...

      - name: Examples / bazel mod explain
        working-directory: examples/
        run: bazelisk mod explain

      - name: Examples / bazel mod graph
        working-directory: examples/
        run: bazelisk mod graph

      - name: Examples / bazel query //...
        working-directory: examples/
        run: bazelisk query //...

      - name: Examples / bazel build //...
        working-directory: examples/
        run: bazelisk build //...

      # Todo: uncomment when we have our first tests in examples, Bazel return code is not 0 if there are no tests
      # - name: Examples / bazel test //...
      #   working-directory: examples/
      #   run: bazelisk test //...
